<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Battle Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* Estilo Geral Estilo Gameboy */
        body { 
            font-family: 'Press Start 2P', cursive; 
            background-color: #2c3e50; 
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(#34495e 20%, transparent 20%);
            background-size: 20px 20px;
        }

        h1 { color: #f1c40f; text-shadow: 4px 4px #c0392b; font-size: 20px; margin-top: 30px; }

        /* Barra de Busca */
        .search-container {
            margin: 20px;
            background: #ecf0f1;
            padding: 15px;
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #95a5a6;
        }

        input {
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            border: 2px solid #333;
            outline: none;
            font-size: 10px;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            padding: 10px 15px;
            cursor: pointer;
            background: #2ecc71;
            color: white;
            border: 4px solid #27ae60;
            font-size: 10px;
            image-rendering: pixelated;
        }

        button:hover { background: #27ae60; }

        #btnBatalha { background: #e74c3c; border-color: #c0392b; margin-top: 20px; }

        /* Arena de Batalha */
        .arena { 
            display: flex; 
            justify-content: center; 
            gap: 40px;
            margin-top: 40px; 
            flex-wrap: wrap;
        }

        .card { 
            background: #fff; 
            padding: 20px; 
            border: 6px double #333; 
            width: 250px; 
            position: relative;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
        }

        .card h3 { font-size: 12px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }

        .info img { 
            width: 150px; 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }

        .stats-text { font-size: 8px; text-align: left; line-height: 1.6; }
        
        .winner { 
            background: #f1c40f !important; 
            border-color: #f39c12 !important; 
            transform: translateY(-10px);
            transition: 0.3s;
        }

        #resultado {
            background: #fff;
            border: 4px solid #000;
            padding: 15px;
            margin-top: 30px;
            min-width: 300px;
            font-size: 12px;
        }

        .evo-list { color: #2980b9; font-size: 7px; margin-top: 10px; }

    </style>
</head>
<body>

    <h1>POKEMON ARENA BATTLE</h1>
    
    <div class="search-container">
        <input type="text" id="pokeInput" placeholder="NOME DO PKMN...">
        <button onclick="buscarPokemon()">BUSCAR</button>
    </div>

    <div class="arena">
        <div id="p1" class="card">
            <h3>PLAYER 1</h3>
            <div class="info"></div>
        </div>

        <div id="p2" class="card">
            <h3>PLAYER 2</h3>
            <div class="info"></div>
        </div>
    </div>

    <div id="resultado">AGUARDANDO DESAFIANTES...</div>
    
    <button id="btnBatalha" style="display:none;" onclick="lutar()">INICIAR BATALHA!</button>

    <script>
        let pokemon1 = null;
        let pokemon2 = null;

        async function buscarPokemon() {
            const nome = document.getElementById('pokeInput').value;
            const response = await fetch(`/pokemon/${nome}`);
            const data = await response.json();

            if (data.error) return alert("ERRO: POKÉMON NÃO ENCONTRADO!");

            if (!pokemon1) {
                pokemon1 = data;
                exibir('p1', data);
            } else {
                pokemon2 = data;
                exibir('p2', data);
                document.getElementById('btnBatalha').style.display = 'inline-block';
            }
            document.getElementById('pokeInput').value = ""; 
        }

        function exibir(id, poke) {
            const div = document.querySelector(`#${id} .info`);
            div.innerHTML = `
                <img src="${poke.image}" alt="${poke.name}">
                <div class="stats-text">
                    <p><strong>NOME:</strong> ${poke.name.toUpperCase()}</p>
                    <p><strong>HP:</strong> ${poke.hp}</p>
                    <p><strong>ATK:</strong> ${poke.attack}</p>
                    <div class="evo-list">EVO: ${poke.evolutions.join(' > ')}</div>
                </div>
            `;
        }

        function lutar() {
            const res = document.getElementById('resultado');
            document.getElementById('p1').classList.remove('winner');
            document.getElementById('p2').classList.remove('winner');

            if (pokemon1.attack > pokemon2.attack) {
                res.innerText = `🏆 ${pokemon1.name.toUpperCase()} GANHOU!`;
                document.getElementById('p1').classList.add('winner');
            } else if (pokemon2.attack > pokemon1.attack) {
                res.innerText = `🏆 ${pokemon2.name.toUpperCase()} GANHOU!`;
                document.getElementById('p2').classList.add('winner');
            } else {
                res.innerText = "EMPATE TÉCNICO!";
            }
        }
    </script>
</body>
</html>
